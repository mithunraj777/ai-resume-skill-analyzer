<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>AI Resume Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
width:520px;
padding:40px;
background:white;
border-radius:18px;
box-shadow:0 20px 60px rgba(0,0,0,0.2);
}

h1{
text-align:center;
margin-bottom:25px;
font-weight:600;
}

.upload-box{
border:2px dashed #bbb;
border-radius:10px;
padding:30px;
text-align:center;
cursor:pointer;
transition:0.3s;
margin-bottom:25px;
}

.upload-box:hover{
border-color:#4facfe;
background:#f4f9ff;
}

.upload-box p{
font-size:14px;
color:#666;
}

input[type="file"]{
display:none;
}

label{
font-weight:500;
}

select{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
margin-top:10px;
margin-bottom:20px;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
color:white;
background:linear-gradient(135deg,#4facfe,#00c6ff);
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

#result{
margin-top:30px;
}

.progressbar{
width:100%;
height:12px;
background:#eee;
border-radius:20px;
margin-top:10px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#4facfe,#00f2fe);
transition:1s;
}

.skills{
margin-top:15px;
}

.skill{
display:inline-block;
padding:7px 14px;
margin:6px;
border-radius:20px;
font-size:13px;
background:#e8f3ff;
}

.missing{
background:#ffe3e3;
}

.loading{
text-align:center;
margin-top:15px;
display:none;
}

/* file preview */

.file-preview{
margin-top:10px;
padding:10px;
background:#f0f5ff;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:14px;
}

.remove-btn{
background:none;
border:none;
font-size:16px;
cursor:pointer;
color:#888;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Resume Analyzer</h1>

<div class="upload-box" onclick="document.getElementById('resume').click()">

<div id="uploadText">
📄 <b>Drag & Drop Resume</b>
<p>or click to upload</p>
</div>

<input type="file" id="resume" onchange="showFileName()">

<div id="filePreview" style="display:none" class="file-preview">

<span id="fileName"></span>

<button class="remove-btn" onclick="removeFile(event)">✖</button>

</div>

</div>

<label>Select Job Role</label>

<select id="role">

<option value="software engineer">Software Engineer</option>
<option value="backend developer">Backend Developer</option>
<option value="frontend developer">Frontend Developer</option>
<option value="full stack developer">Full Stack Developer</option>
<option value="ai/ml engineer">AI / ML Engineer</option>
<option value="data scientist">Data Scientist</option>
<option value="data analyst">Data Analyst</option>
<option value="devops engineer">DevOps Engineer</option>
<option value="cloud engineer">Cloud Engineer</option>
<option value="mobile developer">Mobile Developer</option>
<option value="game developer">Game Developer</option>
<option value="cybersecurity engineer">Cybersecurity Engineer</option>
<option value="database engineer">Database Engineer</option>

</select>

<button onclick="analyze()">Analyze Resume</button>

<div class="loading" id="loading">
Analyzing resume...
</div>

<div id="result"></div>

</div>

<script>

function showFileName(){

const fileInput=document.getElementById("resume")
const file=fileInput.files[0]

if(file){

document.getElementById("uploadText").style.display="none"

document.getElementById("filePreview").style.display="flex"

document.getElementById("fileName").innerHTML=
"✅ "+file.name+" <small style='color:gray'>Ready for analysis</small>"

}

}

function removeFile(event){

event.stopPropagation()

document.getElementById("resume").value=""

document.getElementById("filePreview").style.display="none"

document.getElementById("uploadText").style.display="block"

}

async function analyze(){

const file=document.getElementById("resume").files[0]
const role=document.getElementById("role").value

if(!file){

alert("Please upload a resume")

return

}

document.getElementById("loading").style.display="block"

const formData=new FormData()

formData.append("resume",file)
formData.append("role",role)

const response=await fetch("/analyze",{

method:"POST",
body:formData

})

const data=await response.json()

document.getElementById("loading").style.display="none"

let html=`

<h3>Match Score: ${data.score}%</h3>

<div class="progressbar">

<div class="progress" id="bar"></div>

</div>

<h4 style="margin-top:20px;">Matched Skills</h4>

<div class="skills">

`

data.matched.forEach(skill=>{

html+=`<span class="skill">${skill}</span>`

})

html+=`

</div>

<h4 style="margin-top:20px;">Missing Skills</h4>

<div class="skills">

`

data.missing.forEach(skill=>{

html+=`<span class="skill missing">${skill}</span>`

})

html+=`</div>`

document.getElementById("result").innerHTML=html

setTimeout(()=>{

document.getElementById("bar").style.width=data.score+"%"

},200)

}

</script>

</body>

</html>
